name: iOS Archive
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        working-directory: app
      - name: Flutter Pub Get
        run: flutter pub get
        working-directory: app
      - name: Prepare iOS build (no codesign fallback)
        if: ${{ env.APPLE_P12_BASE64 == '' || env.APPLE_PROVISION_PROFILE_BASE64 == '' }}
        run: flutter build ios --release --no-codesign
        working-directory: app
      - name: Archive with Xcode (no codesign fallback)
        if: ${{ env.APPLE_P12_BASE64 == '' || env.APPLE_PROVISION_PROFILE_BASE64 == '' }}
        run: xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/ios/archive/Runner.xcarchive CODE_SIGNING_ALLOWED=NO archive
        working-directory: app
      - name: Upload Xcode Archive
        uses: actions/upload-artifact@v4
        with:
