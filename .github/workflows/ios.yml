 name: iOS Archive
 on:
   workflow_dispatch:
   push:
     branches:
       - main
   pull_request:
     branches:
       - main
 jobs:
   build:
     runs-on: macos-latest
     steps:
       - uses: actions/checkout@v4
       - uses: subosito/flutter-action@v2
         with:
           channel: 'stable'
           cache: true
        - name: Install CocoaPods
          run: |
            cd ios
            pod install
          working-directory: app
       - name: Flutter Pub Get
         run: flutter pub get
         working-directory: app
        - name: Import signing certificate
          if: ${{ secrets.APPLE_P12_BASE64 != '' }}
          uses: apple-actions/import-codesign-certificates@v2
          with:
            p12-file-base64: ${{ secrets.APPLE_P12_BASE64 }}
            p12-password: ${{ secrets.APPLE_P12_PASSWORD }}
        - name: Install provisioning profile
          if: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
          env:
            PROFILE_B64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          run: |
            echo "$PROFILE_B64" | base64 --decode > profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PROFILE_UUID=$(security cms -D -i profile.mobileprovision | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin)
            PROFILE_NAME=$(security cms -D -i profile.mobileprovision | /usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin)
            cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
            echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
        - name: Archive with Xcode (signed)
          if: ${{ secrets.APPLE_P12_BASE64 != '' && secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
          run: xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/ios/archive/Runner.xcarchive archive
         working-directory: app
        - name: Create ExportOptions.plist
          if: ${{ secrets.APPLE_P12_BASE64 != '' && secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
          env:
            TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
            BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          run: |
            TEAM_ID_VAL=${TEAM_ID:-M7TM8A4V9S}
            BUNDLE_ID_VAL=${BUNDLE_ID:-com.ktinnovations.campusAi}
            cat > ios/ExportOptions.plist <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${TEAM_ID_VAL}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>${BUNDLE_ID_VAL}</key>
                <string>${PROFILE_NAME}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
            </dict>
            </plist>
            EOF
          working-directory: app
        - name: Export IPA
          if: ${{ secrets.APPLE_P12_BASE64 != '' && secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
          run: xcodebuild -exportArchive -archivePath build/ios/archive/Runner.xcarchive -exportPath build/ios/ipa -exportOptionsPlist ios/ExportOptions.plist
          working-directory: app
        - name: Upload IPA
          if: ${{ secrets.APPLE_P12_BASE64 != '' && secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
          uses: actions/upload-artifact@v4
          with:
            name: ios-ipa
            path: app/build/ios/ipa/*.ipa
        - name: Prepare iOS build (no codesign fallback)
          if: ${{ secrets.APPLE_P12_BASE64 == '' || secrets.APPLE_PROVISION_PROFILE_BASE64 == '' }}
          run: flutter build ios --release --no-codesign
          working-directory: app
        - name: Archive with Xcode (no codesign fallback)
          if: ${{ secrets.APPLE_P12_BASE64 == '' || secrets.APPLE_PROVISION_PROFILE_BASE64 == '' }}
          run: xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/ios/archive/Runner.xcarchive CODE_SIGNING_ALLOWED=NO archive
          working-directory: app
        - name: Upload Xcode Archive
         uses: actions/upload-artifact@v4
         with:
           name: ios-xcarchive
           path: app/build/ios/archive/Runner.xcarchive
